name: Issue Labeler

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            const labels = [];

            if (/\b(bug|error|crash|broken|fail|regression|not working)\b/.test(text)) {
              labels.push('bug');
            }
            if (/\b(feature|enhancement|request|would like|proposal)\b/.test(text)) {
              labels.push('enhancement');
            }
            if (/\b(ui|css|style|layout|design|icon|visual|font)\b/.test(text)) {
              labels.push('area: ui');
            }
            if (/\b(data|schema|database|sql|repository|orm|query)\b/.test(text)) {
              labels.push('area: data');
            }
            if (/\b(build|cargo|rust|tauri|config|npm|vite|ci|workflow|deploy)\b/.test(text)) {
              labels.push('area: infra');
            }
            if (/\b(doc|readme|typo)\b/.test(text)) {
              labels.push('area: docs');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
